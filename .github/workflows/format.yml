name: Format Check
on: [push]

jobs:
  build:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install packages
        uses: borales/actions-yarn@v5
        with:
          cmd: install

      - name: Check formatting
        uses: borales/actions-yarn@v5
        with:
          cmd: format:check
